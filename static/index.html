<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
     <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
    <h1>Learning Log</h1>
    <div id="list-view">
        <form id="note-form">
        <div class="input-group mb-3">
            <span class="input-group-text">Title</span>
            <input type="text" class="form-control" id="title-input" aria-label="Title" required>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text">Content</span>
            <textarea class="form-control" id="content-input" aria-label="Content"></textarea>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text">Category</span>
            <input type="text" class="form-control" id="category-input" aria-label="Category" list="category-options">
            <datalist id="category-options"></datalist>

        </div>
        <button type="submit" class="btn btn-primary mb-3">Add note</button>
    </form>

    <ul id="notes-list" class="list-group"></ul>
    </div>
    <div id="note-view" hidden>
    <button id="back-button">← Back</button>
    <button id="delete-button">Delete note</button>
    <button id="edit-button">Edit</button>
    <div id="note-detail"></div>
    </div>
    <script src="/static/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </div>
</body>
</html>
